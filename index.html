<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria</title>
    <link rel="stylesheet" href="styles.css">

    <script src="script.js"></script>
</head>
<body>

<!--General-->
<div class="panell">

<!--    Títol-->
    <div style="font-family: 'CantarelL Extra Bold'" class="header">Nurcha says</div>
    <div class="memory-next" id="notification">
    </div>

<!--    Panell amb colors-->
    <div class="memory-game">
        <div class="row">
            <button class="card color1" onclick="comprovar('#ff7171')"></button>
            <button class="card color2" onclick="comprovar('#fd9cb2')"></button>
            <button class="card color3" onclick="comprovar('#ffa2de')"></button>
        </div>
        <div class="row">
            <button class="card color4" onclick="comprovar('#bb92ed')"></button>
            <button class="card color5" onclick="comprovar('#79dbff')"></button>
            <button class="card color6" onclick="comprovar('#ffd7d0')"></button>
        </div>
        <div class="row">
            <button class="card color7" onclick="comprovar('#729ef8')"></button>
            <button class="card color8" onclick="comprovar('#68d5ab')"></button>
            <button class="card color9" onclick="comprovar('#ffe680')"></button>
        </div>

    </div>

<!--    Missatges-->
    <div style="font-family: Cantarell" class="memory-message">
        <div id="message">
            <p style="margin-bottom: 0px">Bienvenido al juego!</p>
            <p style="margin-bottom: 0px; margin-top:0px">Dale a comenzar para inciar partida</p>
        </div>
        <div class="buttons" id="boto">
            <button style="margin-top:15px;" class="button-3" role="button"  onclick="iniciarPartida()">Comenzar</button>
        </div>
    </div>

<!--    Botó d'inici-->


</div>

</body>
</html>
